<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Story | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>
    <div class="editor-layout">
        <!-- Editor Sidebar (Chapters) -->
        <aside class="editor-sidebar">
            <div class="sidebar-top">
                <button class="back-btn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <h3>Chapters</h3>
                <button id="add-chapter-btn" class="icon-btn" title="New Chapter">➕</button>
            </div>
            <div id="chapters-list" class="chapters-list">
                <!-- Chapters injected here -->
                <div class="loading-small">Loading chapters...</div>
            </div>
            <div class="sidebar-bottom">
                <button id="story-bible-btn" class="bible-toggle">📖 Open Story Bible</button>
            </div>
        </aside>

        <!-- Main Writing Area -->
        <main class="writing-area">
            <header class="editor-header">
                <input type="text" id="chapter-title-input" placeholder="Untitled Chapter" class="title-input">
                <div class="editor-status">
                    <button id="branching-btn" class="icon-btn-text" title="Create story paths">🗺️ Branching</button>
                    <span id="save-status">Saved</span>
                    <button id="publish-btn" class="publish-btn">Publish</button>
                </div>
            </header>
            
            <div id="editor-container"></div>
        </main>

        <!-- Right Panel (Story Info) -->
        <aside class="story-info-panel">
            <div class="panel-section">
                <h3>Story Details</h3>
                <div class="story-cover-box" id="story-cover-display">
                    <span>Click to upload cover</span>
                </div>
                <div class="input-group dark">
                    <label>Story Title</label>
                    <input type="text" id="story-title-input" placeholder="The Great Journey">
                </div>
                <div class="input-group dark">
                    <label>Category</label>
                    <select id="story-category-select">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div class="input-group dark">
                    <label>Description</label>
                    <textarea id="story-desc-input" placeholder="What's your story about?"></textarea>
                </div>
                <button id="save-meta-btn" class="secondary-btn">Update Details</button>
            </div>

            <div class="panel-section divider-top">
                <h3>Monetization</h3>
                <div class="input-group dark row">
                    <label>Premium Chapter</label>
                    <input type="checkbox" id="is-premium-toggle">
                </div>
                <div id="coin-price-group" class="input-group dark hidden">
                    <label>Coin Price</label>
                    <input type="number" id="coin-price-input" value="10" min="1">
                </div>
            </div>

            <div class="panel-section divider-top">
                <h3>Export & Publish</h3>
                <div class="export-options">
                    <button class="export-btn" id="export-pdf">📄 PDF</button>
                    <button class="export-btn" id="export-epub">📔 EPUB</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Branching Overlay -->
    <div id="branching-overlay" class="overlay hidden">
        <div class="glass-card branching-container">
            <div class="overlay-header">
                <h2>Interactive Paths</h2>
                <p>Create choices that appear at the end of this chapter.</p>
                <button id="close-branching" class="icon-btn">✕</button>
            </div>
            <div id="choices-list" class="choices-list">
                <!-- Choices appear here -->
            </div>
            <div class="add-choice-form">
                <input type="text" id="new-choice-text" placeholder="e.g. Open the mysterious door">
                <select id="new-choice-target">
                    <option value="">Target Chapter...</option>
                </select>
                <button id="add-choice-btn" class="primary-btn small">Add Path</button>
            </div>
        </div>
    </div>

    <!-- Story Bible Overlay -->
    <div id="bible-overlay" class="overlay hidden">
        <div class="glass-card bible-container">
            <div class="bible-header">
                <h2>Story Bible</h2>
                <button id="close-bible" class="icon-btn">✕</button>
            </div>
            <div class="bible-content">
                <div class="bible-tabs">
                    <button class="active">Characters</button>
                    <button>World Building</button>
                    <button>Plot Notes</button>
                </div>
                <div id="bible-notes" class="bible-notes">
                    <textarea placeholder="Write your world-building notes here..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="js/editor.js?v=20260429-final"></script>
</body>
</html>
