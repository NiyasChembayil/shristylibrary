<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Story | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
</head>
<body>
    <div class="editor-layout">
        <!-- Editor Sidebar (Chapters) -->
        <aside class="editor-sidebar">
            <div class="sidebar-top">
                <button class="back-btn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                <h3>Chapters</h3>
                <button id="add-chapter-btn" class="icon-btn" title="New Chapter">➕</button>
            </div>
            <div id="chapters-list" class="chapters-list">
                <!-- Chapters injected here -->
                <div class="loading-small">Loading chapters...</div>
            </div>
            <div class="sidebar-bottom">
                <button id="story-bible-btn" class="bible-toggle">📖 Open Story Bible</button>
            </div>
        </aside>

        <!-- Main Writing Area -->
        <main class="writing-area">
            <header class="editor-header">
                <input type="text" id="chapter-title-input" placeholder="Untitled Chapter" class="title-input">
                <div class="editor-status">
                    <button id="branching-btn" class="icon-btn-text" title="Create story paths">🗺️ Branching</button>
                    <span id="save-status">Saved</span>
                    <button id="publish-btn" class="publish-btn">Publish</button>
                </div>
            </header>
            
            <div id="editor-container"></div>
        </main>

        <!-- Right Panel (Story Info) -->
        <aside class="story-info-panel">
            <div class="panel-section">
                <h3>Story Details</h3>
                <div class="story-cover-box" id="story-cover-display">
                    <span>Click to upload cover</span>
                </div>
                <div class="input-group dark">
                    <label>Story Title</label>
                    <input type="text" id="story-title-input" placeholder="The Great Journey">
                </div>
                <div class="input-group dark">
                    <label>Category</label>
                    <select id="story-category-select">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div class="input-group dark">
                    <label>Description</label>
                    <textarea id="story-desc-input" placeholder="What's your story about?"></textarea>
                </div>
                <button id="save-meta-btn" class="secondary-btn">Update Details</button>
            </div>

            <div class="panel-section divider-top">
                <h3>Monetization</h3>
                <div class="input-group dark row">
                    <label>Premium Chapter</label>
                    <input type="checkbox" id="is-premium-toggle">
                </div>
                <div id="coin-price-group" class="input-group dark hidden">
                    <label>Coin Price</label>
                    <input type="number" id="coin-price-input" value="10" min="1">
                </div>
            </div>

            <div class="panel-section divider-top">
                <h3>Export & Publish</h3>
                <div class="export-options">
                    <button class="export-btn" id="export-pdf">📄 PDF</button>
                    <button class="export-btn" id="export-epub">📔 EPUB</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Branching Overlay -->
    <div id="branching-overlay" class="overlay hidden">
        <div class="glass-card branching-container">
            <div class="overlay-header">
                <h2>Interactive Paths</h2>
                <p>Create choices that appear at the end of this chapter.</p>
                <button id="close-branching" class="icon-btn">✕</button>
            </div>
            <div id="choices-list" class="choices-list">
                <!-- Choices appear here -->
            </div>
            <div class="add-choice-form">
                <input type="text" id="new-choice-text" placeholder="e.g. Open the mysterious door">
                <select id="new-choice-target">
                    <option value="">Target Chapter...</option>
                </select>
                <button id="add-choice-btn" class="primary-btn small">Add Path</button>
            </div>
        </div>
    </div>

    <!-- Story Bible Overlay -->
    <div id="bible-overlay" class="overlay hidden">
        <div class="glass-card bible-container">
            <div class="bible-header">
                <h2>Story Bible</h2>
                <button id="close-bible" class="icon-btn">✕</button>
            </div>
            <div class="bible-content">
                <div class="bible-tabs">
                    <button class="active">Characters</button>
                    <button>World Building</button>
                    <button>Plot Notes</button>
                </div>
                <div id="bible-notes" class="bible-notes">
                    <textarea placeholder="Write your world-building notes here..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://srishty-backend.onrender.com/api/';
        const token = localStorage.getItem('studio_access');

        if (!token) {
            window.location.href = 'index.html';
        }

        const studioApi = axios.create({
            baseURL: API_BASE,
            headers: { 'Authorization': `Bearer ${token}` }
        });

        let currentStoryId = new URLSearchParams(window.location.search).get('id');
        let currentChapterId = null;
        let chapters = [];
        let quill = null;
        let saveTimeout = null;

        const chaptersList = document.getElementById('chapters-list');
        const addChapterBtn = document.getElementById('add-chapter-btn');
        const chapterTitleInput = document.getElementById('chapter-title-input');
        const saveStatus = document.getElementById('save-status');
        const publishBtn = document.getElementById('publish-btn');
        const bibleBtn = document.getElementById('story-bible-btn');
        const bibleOverlay = document.getElementById('bible-overlay');
        const closeBible = document.getElementById('close-bible');
        const coverPreview = document.getElementById('story-cover-display');
        const storyTitleInput = document.getElementById('story-title-input');
        const storyDescInput = document.getElementById('story-desc-input');
        const categorySelect = document.getElementById('story-category-select');
        const updateDetailsBtn = document.getElementById('save-meta-btn');

        function initQuill() {
            if (typeof Quill === 'undefined') {
                saveStatus.textContent = 'Editor Failed (Network Issue)';
                document.getElementById('editor-container').innerHTML = '<p style="padding:20px;color:red;">Error: Writing tool failed to load. Please check your internet connection and refresh.</p>';
                return;
            }

            quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'header': 1 }, { 'header': 2 }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['clean']
                    ]
                },
                placeholder: 'Start writing your story...'
            });

            quill.focus();

            quill.on('text-change', () => {
                if (!currentChapterId) return;
                saveStatus.textContent = 'Unsaved changes...';
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(autoSave, 2000);
            });
        }

        async function autoSave() {
            if (!currentChapterId) return;
            saveStatus.textContent = 'Saving...';
            try {
                await studioApi.patch(`core/chapters/${currentChapterId}/`, {
                    title: chapterTitleInput.value,
                    content: quill.root.innerHTML
                });
                saveStatus.textContent = 'Saved';
            } catch (err) {
                console.error('Save failed:', err);
                saveStatus.textContent = 'Save failed!';
            }
        }

        async function initEditor() {
            console.log('Initializing Editor...');
            initQuill();
            saveStatus.textContent = 'Ready to write';
            try {
                if (currentStoryId) {
                    Promise.all([loadStoryDetails(), loadChapters()]);
                } else {
                    await createNewStory();
                }
            } catch (err) {
                saveStatus.textContent = 'Offline Mode';
            }
        }

        async function createNewStory() {
            try {
                const catRes = await studioApi.get('core/categories/');
                const categories = catRes.data.results || catRes.data;
                const categoryId = categories.length > 0 ? categories[0].id : 1;
                const res = await studioApi.post('core/books/', { title: 'Untitled Story', category: categoryId });
                currentStoryId = res.data.id;
                window.history.pushState({}, '', `editor.html?id=${currentStoryId}`);
                await loadStoryDetails();
                await addChapter();
            } catch (err) {
                saveStatus.textContent = 'Init Failed';
            }
        }

        async function loadStoryDetails() {
            try {
                const catRes = await studioApi.get('core/categories/');
                const categories = catRes.data.results || catRes.data;
                categorySelect.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                const res = await studioApi.get(`core/books/${currentStoryId}/`);
                const story = res.data;
                storyTitleInput.value = story.title;
                storyDescInput.value = story.description || '';
                categorySelect.value = story.category;
                if (story.cover) {
                    coverPreview.style.backgroundImage = `url(${story.cover})`;
                    coverPreview.innerHTML = '';
                }
            } catch (err) {}
        }

        coverPreview.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('cover', file);
                saveStatus.textContent = 'Uploading...';
                try {
                    await studioApi.patch(`core/books/${currentStoryId}/`, formData, { headers: { 'Content-Type': 'multipart/form-data' } });
                    saveStatus.textContent = 'Cover updated';
                    loadStoryDetails();
                } catch (err) {}
            };
            input.click();
        });

        updateDetailsBtn.addEventListener('click', async () => {
            const data = { title: storyTitleInput.value, description: storyDescInput.value, category: categorySelect.value };
            saveStatus.textContent = 'Updating...';
            try {
                await studioApi.patch(`core/books/${currentStoryId}/`, data);
                saveStatus.textContent = 'Details saved';
            } catch (err) {}
        });

        async function loadChapters() {
            try {
                const res = await studioApi.get(`core/chapters/?book=${currentStoryId}`);
                chapters = res.data.results || res.data;
                renderChapters();
                if (chapters.length > 0 && !currentChapterId) selectChapter(chapters[0].id);
            } catch (err) {}
        }

        function renderChapters() {
            chaptersList.innerHTML = chapters.map((ch, idx) => `
                <div class="chapter-item ${currentChapterId == ch.id ? 'active' : ''}" onclick="selectChapter(${ch.id})">
                    <span>Ch ${idx + 1}: ${ch.title || 'Untitled'}</span>
                </div>
            `).join('');
        }

        async function selectChapter(id) {
            currentChapterId = id;
            const chapter = chapters.find(ch => ch.id == id);
            chapterTitleInput.value = chapter.title || 'Untitled';
            quill.root.innerHTML = chapter.content || '';
            renderChapters();
        }

        async function addChapter() {
            try {
                const res = await studioApi.post('core/chapters/', { book: currentStoryId, title: 'New Chapter', content: '', order: chapters.length + 1 });
                await loadChapters();
                selectChapter(res.data.id);
            } catch (err) {}
        }

        addChapterBtn.addEventListener('click', addChapter);
        chapterTitleInput.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(autoSave, 2000);
        });

        bibleBtn.addEventListener('click', () => bibleOverlay.classList.remove('hidden'));
        closeBible.addEventListener('click', () => bibleOverlay.classList.add('hidden'));

        publishBtn.addEventListener('click', async () => {
            try {
                await studioApi.patch(`core/books/${currentStoryId}/`, { moderation_status: 'published' });
                alert('Congratulations! Published!');
            } catch (err) {}
        });

        // Branching logic
        document.getElementById('branching-btn').addEventListener('click', () => {
            document.getElementById('branching-overlay').classList.remove('hidden');
        });
        document.getElementById('close-branching').addEventListener('click', () => {
            document.getElementById('branching-overlay').classList.add('hidden');
        });

        window.onload = initEditor;
    </script>
</body>
</html>
