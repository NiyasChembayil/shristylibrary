<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Toolkit | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/toolkit.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="studio-layout">
        <!-- Sidebar Reused -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon small">✍️</div>
                <h2>SRISHTY</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="stories.html" class="nav-item">📚 My Stories</a>
                <a href="bible.html" class="nav-item">🧬 Story Bible</a>
                <a href="toolkit.html" class="nav-item active">🎨 Social Toolkit</a>
                <a href="analytics.html" class="nav-item">📈 Pro Analytics</a>
                <a href="achievements.html" class="nav-item">🏆 Achievements</a>
            </nav>
        </aside>

        <!-- Toolkit Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Social Toolkit</h1>
                    <p>Generate stunning marketing cards for your stories.</p>
                </div>
            </header>

            <div class="toolkit-grid">
                <!-- Controls -->
                <div class="glass-card controls-panel">
                    <h3>Design Controls</h3>
                    
                    <div class="input-group dark">
                        <label>Select Story</label>
                        <select id="story-selector">
                            <option value="">Loading stories...</option>
                        </select>
                    </div>

                    <div class="input-group dark">
                        <label>Featured Quote</label>
                        <textarea id="card-quote" placeholder="Enter a powerful line from your story...">"Every story starts with a single word."</textarea>
                    </div>

                    <div class="input-group dark">
                        <label>Background Theme</label>
                        <div class="theme-grid">
                            <div class="theme-opt active" data-theme="midnight" style="background: #0F172A;"></div>
                            <div class="theme-opt" data-theme="sunset" style="background: linear-gradient(135deg, #FF6584, #6C63FF);"></div>
                            <div class="theme-opt" data-theme="emerald" style="background: linear-gradient(135deg, #10B981, #00D2FF);"></div>
                            <div class="theme-opt" data-theme="gold" style="background: linear-gradient(135deg, #F59E0B, #FF6584);"></div>
                        </div>
                    </div>

                    <button id="download-card" class="primary-btn">Download Story Card</button>
                </div>

                <!-- Preview Area -->
                <div class="preview-container">
                    <div id="social-card" class="social-card-render midnight">
                        <div class="card-overlay"></div>
                        <div class="card-content">
                            <div class="card-book-meta">
                                <img id="preview-cover" src="" class="mini-cover">
                                <h2 id="preview-title">Story Title</h2>
                            </div>
                            <div class="quote-area">
                                <span class="quote-mark">"</span>
                                <p id="preview-quote">Every story starts with a single word.</p>
                            </div>
                            <div class="card-footer">
                                <div class="brand-pill">SRISHTY LIBRARY</div>
                                <p id="preview-author">by Author Name</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/toolkit.js"></script>
</body>
</html>
