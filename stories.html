<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stories | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="studio-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon small">✍️</div>
                <h2>SRISHTY</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="stories.html" class="nav-item active">
                    <span class="icon">📚</span> My Stories
                </a>
                <a href="bible.html" class="nav-item">
                    <span class="icon">🧬</span> Story Bible
                </a>
                <a href="toolkit.html" class="nav-item">
                    <span class="icon">🎨</span> Social Toolkit
                </a>
                <a href="analytics.html" class="nav-item">
                    <span class="icon">📈</span> Pro Analytics
                </a>
                <a href="achievements.html" class="nav-item">
                    <span class="icon">🏆</span> Achievements
                </a>
                <div class="nav-divider"></div>
                <a href="#" id="logout-btn" class="nav-item logout">
                    <span class="icon">🚪</span> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>My Stories</h1>
                    <p>Manage and edit your creative library.</p>
                </div>
                <div class="top-actions">
                    <button class="create-btn" onclick="window.location.href='editor.html'">+ New Story</button>
                </div>
            </header>

            <section class="content-section">
                <div id="stories-grid" class="stories-grid">
                    <div class="loading-placeholder">Loading your stories...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
