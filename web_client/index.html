<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty Author Studio | Create Your Legacy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Deployment Heartbeat: 2026-04-29-v2 -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="main-container">
        <!-- Animated Background -->
        <div class="bg-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
        </div>

        <section class="auth-section">
            <div class="glass-card auth-card">
                <div class="logo-area">
                    <div class="logo-icon">✍️</div>
                    <h1>SRISHTY <span>STUDIO</span></h1>
                    <p class="tagline">Where stories find their soul.</p>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button id="tab-login" class="active">Login</button>
                    <button id="tab-signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn">Enter Studio</button>
                </form>

                <!-- Signup Form (Hidden) -->
                <form id="signup-form" class="auth-form hidden">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="signup-username" placeholder="Choose a username" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="author@srishty.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="At least 8 characters" required>
                    </div>
                    <input type="hidden" id="signup-role" value="author">
                    <button type="submit" class="primary-btn">Create Author Account</button>
                </form>

                <div id="auth-message" class="message"></div>
            </div>
        </section>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
