<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty Author Studio v5.0</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Premium Styles -->
    <link rel="stylesheet" href="css/style_v5.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 class="brand" style="font-size: 42px; letter-spacing: -1px;">Srishty<span class="text-gradient">.</span></h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Masterpiece Creator Studio</p>
            </div>

            <!-- LOGIN FORM -->
            <div id="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="login-username" class="form-input" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="app.handleAuth('login')">Sign In</button>
                <p style="text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 14px;">
                    New to Srishty? <a href="#" onclick="app.toggleAuth()" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Create Account</a>
                </p>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-form" class="hidden">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="reg-username" class="form-input" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label class="form-label">Email (Optional)</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="Minimum 8 characters">
                </div>
                <button class="btn-primary" onclick="app.handleAuth('register')">Create Account</button>
                <p style="text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 14px;">
                    Already have an account? <a href="#" onclick="app.toggleAuth()" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="app-section" class="app-shell hidden">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div style="margin-bottom: 40px;">
                <h2 class="brand" style="font-size: 24px;">Srishty<span class="text-gradient">.</span></h2>
            </div>
            
            <nav style="flex: 1;">
                <div class="nav-item active" onclick="app.showTab('my-stories')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    My Stories
                </div>
                <div class="nav-item" onclick="app.showTab('analytics')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    Analytics
                </div>
            </nav>

            <div style="padding-top: 20px; border-top: 1px solid var(--border-color);">
                <div class="nav-item" onclick="app.logout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </div>
            </div>
        </aside>

        <!-- CONTENT AREA -->
        <main class="main-content">
            <div id="tab-my-stories">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                    <h1 style="font-size: 32px;">My Library</h1>
                    <button class="btn-primary" style="width: auto; padding: 12px 24px;" onclick="app.showNewStoryModal()">+ New Story</button>
                </div>
                
                <div id="story-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;">
                    <!-- Stories will be injected here -->
                    <div style="grid-column: 1/-1; text-align: center; padding: 80px; color: var(--text-secondary);">
                        <p>Loading your stories...</p>
                    </div>
                </div>
            </div>
            
            <div id="tab-analytics" class="hidden">
                <h1 style="font-size: 32px; margin-bottom: 32px;">Analytics Dashboard</h1>
                <div id="analytics-chart" style="height: 400px; background: var(--bg-secondary); border-radius: 24px; border: 1px solid var(--border-color);"></div>
            </div>
        </main>
    </div>

    <!-- VERSION LABEL -->
    <div style="position: fixed; bottom: 16px; right: 16px; background: var(--glass); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 100px; font-size: 11px; color: var(--text-secondary); border: 1px solid var(--glass-border); z-index: 2000;">
        v5.0 ULTRA PRO
    </div>

    <script src="js/app.js"></script>
</body>
</html>
