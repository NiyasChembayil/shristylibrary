<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Bible | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/bible.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <div class="studio-layout">
        <!-- Sidebar Reused -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon small">✍️</div>
                <h2>SRISHTY</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="stories.html" class="nav-item">📚 My Stories</a>
                <a href="bible.html" class="nav-item active">🧬 Story Bible</a>
                <a href="toolkit.html" class="nav-item">🎨 Social Toolkit</a>
                <a href="analytics.html" class="nav-item">📈 Pro Analytics</a>
                <a href="achievements.html" class="nav-item">🏆 Achievements</a>
            </nav>
        </aside>

        <!-- Bible Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-text">
                    <h1>Story Bible</h1>
                    <p>Map your characters and their complex relationships.</p>
                </div>
                <div class="top-actions">
                    <button class="create-btn" id="add-char-btn">+ New Character</button>
                </div>
            </header>

            <div class="bible-grid">
                <!-- Sidebar: Characters -->
                <div class="glass-card char-sidebar">
                    <h3>Characters</h3>
                    <div id="char-list" class="char-list">
                        <!-- Characters list -->
                    </div>
                </div>

                <!-- Main: Relation Graph -->
                <div class="graph-container">
                    <div id="relation-graph"></div>
                    <div class="graph-hint">💡 Drag characters to explore connections</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Character Modal -->
    <div id="char-modal" class="overlay hidden">
        <div class="glass-card modal-box">
            <h2>Add Character</h2>
            <div class="input-group dark">
                <label>Name</label>
                <input type="text" id="new-char-name" placeholder="Protagonist Name">
            </div>
            <div class="input-group dark">
                <label>Role</label>
                <input type="text" id="new-char-role" placeholder="Hero, Villain, etc.">
            </div>
            <div class="modal-actions">
                <button id="cancel-char" class="secondary-btn">Cancel</button>
                <button id="save-char" class="primary-btn">Add to Bible</button>
            </div>
        </div>
    </div>

    <script src="js/bible.js"></script>
</body>
</html>
