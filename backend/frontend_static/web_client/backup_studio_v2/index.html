<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty | Author Studio Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/web_client/style.css">
    <link rel="icon" href="/static/assets/logo.png" type="image/x-icon">
    <style>
        body.auth-gateway {
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            display: flex;
            align-items: center; justify-content: center;
            height: 100vh; margin: 0;
            color: white;
        }

        .auth-container {
            width: 100%; max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .auth-logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            color: white;
            letter-spacing: -1px;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            font-size: 14px;
        }

        .auth-form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .auth-form-group label {
            display: block; display: none;
        }

        .auth-input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .auth-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6C63FF;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.2);
        }

        .btn-auth-submit {
            width: 100%;
            padding: 18px;
            background: #6C63FF;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth-submit:hover {
            background: #5b54e3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .auth-footer a {
            color: #6C63FF;
            text-decoration: none;
            font-weight: 700;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-container { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body class="auth-gateway">
    <div class="auth-container">
        <div class="auth-logo">Srishty</div>
        <div class="auth-subtitle">Professional Author Studio</div>

        <form id="auth-form" onsubmit="readerApp.handleAuthSubmit(event)">
            <div class="auth-form-group">
                <input type="text" id="auth-username" class="auth-input" placeholder="Username" required>
            </div>
            <div class="auth-form-group hidden" id="email-group">
                <input type="email" id="auth-email" class="auth-input" placeholder="Email Address">
            </div>
            <div class="auth-form-group">
                <input type="password" id="auth-password" class="auth-input" placeholder="Password" required>
            </div>

            <p id="auth-error" style="color: #ff6b6b; margin-bottom: 15px; font-size: 14px; display: none; text-align: center;"></p>

            <button type="submit" class="btn-auth-submit" id="auth-submit-btn">Enter Studio</button>
        </form>

        <div class="auth-footer">
            <span id="auth-toggle-text">New author?</span> 
            <a href="#" onclick="readerApp.toggleAuthMode(event)" id="auth-toggle-link">Create Studio Account</a>
        </div>
    </div>

    <!-- Hidden modal compat for app.js (legacy) -->
    <div id="auth-modal" class="hidden"></div>

    <script src="/static/web_client/app.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = 'studio.html';
        }
    </script>
</body>
</html>
